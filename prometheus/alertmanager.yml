route:
  group_by: ['alertname']
  group_wait: 5s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'telegram_bot'

receivers:
  - name: 'telegram_bot'
    telegram_configs:
      - bot_token: 'TELEGRAM_BOT_TOKEN'
        chat_id: 123456789
        parse_mode: 'HTML'
        message: |
          🚨 <b>CẢNH BÁO HỆ THỐNG</b> 🚨
          <b>Tên lỗi:</b> {{ .GroupLabels.alertname }}
          <b>Mô tả:</b> {{ .CommonAnnotations.description }}
          <b>Mức độ:</b> {{ .CommonLabels.severity }}
