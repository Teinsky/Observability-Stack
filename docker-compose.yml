services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped
    networks:
      - loki-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - loki-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/config.yml
    command:
      - '--config.file=/etc/alertmanager/config.yml'
    restart: unless-stopped
    networks:
      - loki-net

  victoriametrics:
    container_name: victoriametrics
    image: victoriametrics/victoria-metrics:latest
    ports:
      - "8428:8428"
    volumes:
      - vmdata:/storage
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "-storageDataPath=/storage"
      - "-httpListenAddr=:8428"
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
      - "-promscrape.config.strictParse=false"
      - "-memory.allowedPercent=2"
    restart: unless-stopped
    networks:
      - loki-net

  vmalert:
    container_name: vmalert
    image: victoriametrics/vmalert:latest
    ports:
      - "8880:8880"
    volumes:
      - ./prometheus/alert.rules.yml:/etc/alerts/alert.rules.yml:ro
    command:
      - "-rule=/etc/alerts/*.yml"
      - "-datasource.url=http://victoriametrics:8428"
      - "-notifier.url=http://alertmanager:9093"
      - "-remoteWrite.url=http://victoriametrics:8428"
      - "-remoteRead.url=http://victoriametrics:8428"
    restart: unless-stopped
    networks:
      - loki-net

  gateway:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - loki-net

  loki-write:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml -target=write
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-shared-data:/loki
    networks:
      - loki-net

  loki-read:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml -target=read
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-shared-data:/loki
    networks:
      - loki-net

  loki-backend:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml -target=backend
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-shared-data:/loki
    networks:
      - loki-net

  promtail:
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/log/syslog:/var/log/syslog:ro
    networks:
      - loki-net
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    networks:
      - loki-net
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  loki-shared-data:
  vmdata:

networks:
  loki-net:
